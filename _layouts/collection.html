---
layout: default
---

{% if site.data.menu %}
  {% include menu.html show_brand=true hide_home=true %}
{% else %}
  {% include back-link.html %}
{% endif %}

<main class="home" id="main" role="main" aria-label="Content">
  <header class="collection-header">
    <h1 class="content-title divided">{{ page.title }}</h1>
    {% if page.description %}
      <p class="collection-description">{{ page.description }}</p>
    {% endif %}
  </header>

  {{ content }}
</main>
